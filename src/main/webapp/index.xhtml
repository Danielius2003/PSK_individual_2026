<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Trainer test</title>
</h:head>

<h:body>

    <h2>Add Trainer</h2>

    <h:form>
        Name:
        <h:inputText value="#{trainerBean.trainer.name}" />
        <h:commandButton value="Save" action="#{trainerBean.save}" />
    </h:form>

    <h2>All Trainers</h2>

    <h:dataTable value="#{trainerBean.allTrainers}" var="t">
        <h:column>
            #{t.id}
        </h:column>
        <h:column>
            #{t.name}
        </h:column>
    </h:dataTable>

</h:body>
</html>
