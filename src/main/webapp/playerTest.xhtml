<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html">

<h:head>
    <title>Player test</title>
</h:head>

<h:body>

    <h2>Add Player</h2>

    <h:form>
        Name:
        <h:inputText value="#{playerBean.player.name}" />
        <h:commandButton value="Save" action="#{playerBean.save}" />
    </h:form>

    <h2>All Players</h2>

    <h:dataTable value="#{playerBean.allPlayers}" var="t">
        <h:column>
            #{t.id}
        </h:column>
        <h:column>
            #{t.name}
        </h:column>
    </h:dataTable>

</h:body>
</html>
