<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">

<f:metadata>
    <f:viewParam name="trainerId" value="#{trainerBean.trainerId}" />
    <f:viewAction action="#{trainerBean.loadTrainer}" />
</f:metadata>

<h:body>

    <h2>Trainer Info</h2>
    Name: #{trainerBean.trainer.name}

    <h3>Players</h3>
    <h:dataTable value="#{trainerBean.trainer.players}" var="p">
        <h:column>
            #{p.name}
        </h:column>
    </h:dataTable>

    <h2>Add Player</h2>
    <h:form>
        <h:inputHidden value="#{trainerBean.trainerId}" />

        <h:selectOneMenu value="#{trainerBean.playerId}">
            <f:selectItems value="#{trainerBean.availablePlayers}"
                           var="p"
                           itemLabel="#{p.name}"
                           itemValue="#{p.id}" />
        </h:selectOneMenu>

        <h:commandButton value="Add Player"
                         action="#{trainerBean.addPlayerToTrainer}">
            <f:ajax execute="@form" render="@form" />
        </h:commandButton>
    </h:form>

    <h:form>
        <h:commandButton value="Back to all the sport clubs" action="allSportClubs.xhtml?faces-redirect=true" />
    </h:form>

</h:body>
</html>
